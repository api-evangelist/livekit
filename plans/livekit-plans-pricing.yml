specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: LiveKit
providerId: livekit
created: '2026-05-08'
modified: '2026-05-08'
reconciled: false
tags:
  - Realtime
  - WebRTC
  - Plans
description: >-
  LiveKit ships in two forms - the open-source server (Apache 2) which can be self-hosted, and
  LiveKit Cloud, a managed service. Cloud uses usage-based pricing across realtime media
  (per-minute connection time and per-GB data), Agents (per agent-session-minute), Inference
  (per second of STT, per token of LLM, per character of TTS), and SIP (per inbound minute +
  monthly per number).
notes: LiveKit Cloud pricing pages were not directly accessible during this run; figures below
  are usage-meter categories rather than exact dollar rates.
sources:
  - https://livekit.io/pricing
  - https://docs.livekit.io/home/cloud/billing/
plans:
  - id: livekit-self-host
    name: Self-host (OSS)
    type: open
    description: Apache 2 - self-host LiveKit server on your infrastructure.
    entries:
      - label: Subscription
        name: oss_subscription
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Apache 2
      - name: Self-operated
  - id: livekit-cloud-build
    name: Cloud Build (Free)
    type: freemium
    description: Free Cloud tier for development with monthly usage allowance.
    entries:
      - label: Monthly subscription
        name: build_monthly
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Limited monthly free usage
      - name: All features available
  - id: livekit-cloud-ship
    name: Cloud Ship (Production)
    type: subscription
    description: Production-ready Cloud tier with usage-based pricing on top of base subscription.
    entries:
      - label: Custom pricing
        name: ship_custom
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Usage-based per-minute and per-GB
      - name: Production SLA
  - id: livekit-cloud-scale
    name: Cloud Scale (Enterprise)
    type: enterprise
    description: Enterprise tier with dedicated capacity, advanced SLAs, and volume discounts.
    entries:
      - label: Custom pricing
        name: scale_custom
        type: subscription
        metric: contract
        limit: -1
        timeFrame: contract
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Dedicated capacity
      - name: Volume discounts
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com

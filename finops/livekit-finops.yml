specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: LiveKit
providerId: livekit
created: '2026-05-08'
modified: '2026-05-08'
reconciled: true
tags:
  - Realtime
  - WebRTC
  - FinOps
  - FOCUS
description: >-
  FinOps view of LiveKit Cloud. Usage-based billing with multiple meters - realtime media
  (per-minute connection time and per-GB data), Agent session minutes, Inference (STT seconds,
  LLM tokens, TTS characters), and SIP (per inbound minute + monthly per number rental). Each
  resource is rounded up to the minimum increment.
sources:
  - https://livekit.io/pricing
  - https://docs.livekit.io/home/cloud/billing/
  - https://focus.finops.org/focus-specification/v1-3/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: LiveKit
serviceCategory: Realtime Infrastructure
billingModel:
  pricingCategory: Subscription + Usage
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Subscription
    - Usage
    - Adjustment
focusColumns:
  ServiceName: LiveKit Cloud
  ServiceCategory: Realtime Infrastructure
  ProviderName: LiveKit
  PublisherName: LiveKit
  InvoiceIssuerName: LiveKit
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
  - name: connection_minutes
    description: Per-minute participant connection time.
    unit: minute
    aggregation: sum
    dimensions:
      - project
      - room
  - name: data_gb
    description: Per-GB media and signaling data transfer.
    unit: gb
    aggregation: sum
    dimensions:
      - project
  - name: agent_session_minutes
    description: Per-minute agent session time.
    unit: minute
    aggregation: sum
    dimensions:
      - project
      - agent
  - name: stt_seconds
    description: STT inference seconds.
    unit: second
    aggregation: sum
    dimensions:
      - project
  - name: llm_tokens
    description: LLM input/output tokens billed via Inference.
    unit: token
    aggregation: sum
    dimensions:
      - project
      - model
  - name: tts_characters
    description: TTS character count.
    unit: character
    aggregation: sum
    dimensions:
      - project
  - name: sip_inbound_minutes
    description: SIP inbound call minutes.
    unit: minute
    aggregation: sum
    dimensions:
      - project
      - phone_number
  - name: phone_number_rental
    description: Monthly phone number rental.
    unit: month
    aggregation: sum
    dimensions:
      - project
      - phone_number
principles:
  - name: Visibility
    description: Pull LiveKit usage exports into FinOps store; tag by project and room.
  - name: Allocation
    description: Allocate connection-minute and Inference cost to consuming product.
  - name: Optimization
    description: Choose lower-cost STT/TTS providers via Inference; close idle rooms; right-size Agents concurrency.
  - name: Accountability
    description: Assign a billing owner per project; review monthly.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
